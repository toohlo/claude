let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = T[lang][el.dataset.i18n] || ''; });
  renderStops(lang);
}

function renderStops(lang) {
  const d = T[lang];
  const container = document.getElementById('stops-container');
  let html = '';

  // Morning section header
  html += `<div class="section-header">
    <span class="section-badge morning" data-i18n="morning_badge">${d.morning_badge}</span>
    <p class="section-desc">${d.morning_desc}</p>
  </div>`;

  d.stops.forEach((s, i) => {
    html += `
    <article class="stop">
      <div class="stop-num">${i+1}</div>
      <div class="stop-content">
        <span class="stop-name">${s.name}</span>
        <span class="stop-era">${s.era}</span>
        <p class="stop-desc">${s.desc}</p>
        ${s.story ? `<div class="story-box"><span class="story-label">${s.story_label}</span><p>${s.story}</p></div>` : ''}
        ${s.kids ? `<div class="kids-box"><span class="kids-label">${s.kids_label}</span><p>${s.kids}</p></div>` : ''}
      </div>
    </article>
    ${s.connector ? `<div class="connector">${s.connector}</div>` : ''}`;
  });

  // Afternoon section header
  html += `<div class="section-header" style="margin-top:8px;">
    <span class="section-badge afternoon">${d.afternoon_badge}</span>
    <p class="section-desc">${d.afternoon_desc}</p>
  </div>`;

  d.afternoon_stops.forEach((s, i) => {
    html += `
    <article class="stop">
      <div class="stop-num free">${String.fromCharCode(65+i)}</div>
      <div class="stop-content">
        <span class="stop-name free">${s.name}</span>
        <div class="free-box"><span class="free-label">${s.free_label}</span><p>${s.desc}</p></div>
      </div>
    </article>`;
  });

  container.innerHTML = html;
}

document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = T.en[el.dataset.i18n] || ''; });
renderStops('en');

stops.forEach(s=>{

map.fitBounds(L.latLngBounds(stops.map(s=>[s.lat,s.lng])),{padding:[40,40]});
