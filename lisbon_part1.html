        story: "Lisbon is so hilly that it developed an entire culture of mechanical assistance: funiculars (elevadores), trams, and this vertical lift. The Santa Justa is the only remaining vertical elevator; the funiculars on the hills of Bica, Glória, and Lavra are still operating. They were all built in the late 19th century when Lisbon was modernising rapidly, and they turned impossible gradients into commuter routes. The same hills that defended the city for centuries became its greatest practical problem the moment people stopped walking everywhere.",

        story_label: "Azulejos — Portugal's Skin",
        story: "The blue-and-white azulejo tiles that cover church facades, station walls, garden benches, and viewpoint panels across Portugal are not merely decorative — they function as the country's visual memory. The word comes from the Arabic 'al-zulaij' (polished stone), a reminder that this tradition arrived with the Moors. The large panels here depict Lisbon as it was before 1755 — a city that no longer exists. The tiles are one of the few ways you can see it. Lisbon tiles are currently being stolen at an alarming rate by collectors; some of the panels around the city are replicas protecting the originals stored safely elsewhere.",

        story_label: "The Saint and the Ravens",
        story: "São Vicente, a 3rd-century martyr from Zaragoza, became Lisbon's patron saint after his relics were brought here by ship in 1173. According to legend, two ravens accompanied the ship throughout its voyage and guarded the relics — which is why Lisbon's coat of arms shows a ship with two ravens. The birds have been the city's emblem ever since. The relics were housed in São Vicente de Fora, the church you are about to visit, until they mysteriously disappeared — possibly during the Napoleonic invasion, possibly earlier. Nobody knows where they are.",

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = T[lang][el.dataset.i18n] || ''; });
  renderStops(lang);
}

function renderStops(lang) {
  const d = T[lang];
  const container = document.getElementById('stops-container');
  let html = '';
  d.stops.forEach((s, i) => {
    html += `
    <article class="stop">
      <div class="stop-num">${i+1}</div>
      <div class="stop-content">
        <span class="stop-name">${s.name}</span>
        <span class="stop-era">${s.era}</span>
        <p class="stop-desc">${s.desc}</p>
        ${s.story ? `<div class="story-box"><span class="story-label">${s.story_label}</span><p>${s.story}</p></div>` : ''}
        ${s.kids ? `<div class="kids-box"><span class="kids-label">${s.kids_label}</span><p>${s.kids}</p></div>` : ''}
      </div>
    </article>
    ${s.connector ? `<div class="connector">${s.connector}</div>` : ''}`;
  });
  html += `<div style="padding:24px 0 8px 76px;">
    <div class="evening-box">
      <strong>${d.evening_label}</strong>
      <p>${d.evening_text}</p>
    </div>
  </div>`;
  container.innerHTML = html;
}

document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = T.en[el.dataset.i18n] || ''; });
renderStops('en');
