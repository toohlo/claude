let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === lang.toUpperCase());
  });
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = T[lang][el.dataset.i18n] || '';
  });
  renderStops(lang);
}

function renderStops(lang) {
  const container = document.getElementById('stops-container');
  const data = T[lang];
  let html = '';

  data.stops.forEach((stop, i) => {
    html += `
    <article class="stop">
      <div class="stop-num">${i + 1}</div>
      <div class="stop-content">
        <span class="stop-name">${stop.name}</span>
        <span class="stop-era">${stop.era}</span>
        <p class="stop-desc">${stop.desc}</p>
        ${stop.story ? `
        <div class="story-box">
          <span class="story-label">${stop.story_label}</span>
          <p>${stop.story}</p>
        </div>` : ''}
        ${stop.kids ? `
        <div class="kids-box">
          <span class="kids-label">${stop.kids_label}</span>
          <p>${stop.kids}</p>
        </div>` : ''}
      </div>
    </article>
    ${stop.connector ? `<div class="connector">${stop.connector}</div>` : ''}`;
  });

  container.innerHTML = html;
}

document.querySelectorAll('[data-i18n]').forEach(el => {
  el.textContent = T.en[el.dataset.i18n] || '';
});
renderStops('en');
